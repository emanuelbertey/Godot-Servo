name: Build Godot-Servo

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: false
    defaults:
      run:
        working-directory: ./rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: libgodot_servo.so
            final_name: libgodot_servo.so

          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: godot_servo.dll
            final_name: godot_servo.dll

          - runner: macos-latest
            target: x86_64-apple-darwin
            bin: libgodot_servo.dylib
            final_name: libgodot_servo_x64.dylib

          - runner: macos-latest
            target: aarch64-apple-darwin
            bin: libgodot_servo.dylib
            final_name: libgodot_servo_arm.dylib

          - runner: ubuntu-latest
            target: aarch64-linux-android
            bin: libgodot_servo.so
            final_name: libgodot_servo.so

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libssl-dev \
            libfontconfig-dev \
            libx11-dev \
            libxext-dev \
            libxt-dev \
            libxmu-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config

      - name: Install cargo-ndk
        if: matrix.target == 'aarch64-linux-android'
        run: |
          cargo install cargo-ndk
          rustup target add aarch64-linux-android

      - name: Setup Android NDK
        if: matrix.target == 'aarch64-linux-android'
        uses: nttld/setup-ndk@v1.5.0
        with:
          ndk-version: r27c

      - name: Setup Java JDK
        if: matrix.target == 'aarch64-linux-android'
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          java-package: jdk

      - name: Build Rust binary
        if: "!contains(matrix.target, 'android')"
        shell: bash
        run: |
          CARGO_TARGET_DIR="target" cargo build --verbose --locked --release --target ${{ matrix.target }}

      - name: Build Rust binary for Android
        if: matrix.target == 'aarch64-linux-android'
        env:
          RUSTFLAGS: "-C link-arg=-lc++_shared -L target/pthread_mock"
        run: |
          mkdir -p target/pthread_mock
          touch target/pthread_mock/libpthread.a
          cargo ndk -t ${{ matrix.target }} --platform 34 build --release --verbose --locked

      - name: Rename binary to final_name
        shell: bash
        run: |
          RELEASE_DIR="target/${{ matrix.target }}/release"
          SRC_FILE="$RELEASE_DIR/${{ matrix.bin }}"
          DEST_FILE="$RELEASE_DIR/${{ matrix.final_name }}"

          echo "Checking for source file: $SRC_FILE"
          if [ ! -f "$SRC_FILE" ]; then
            echo "Searching for binary in $RELEASE_DIR..."
            ls -R "$RELEASE_DIR"
            ACTUAL_FILE=$(find "$RELEASE_DIR" -name "${{ matrix.bin }}" | head -n 1)
            if [ -n "$ACTUAL_FILE" ]; then
              SRC_FILE="$ACTUAL_FILE"
              echo "Found file at: $SRC_FILE"
            fi
          fi

          if [ -f "$SRC_FILE" ]; then
            if [ "$SRC_FILE" != "$DEST_FILE" ]; then
              mv "$SRC_FILE" "$DEST_FILE"
              echo "Moved $SRC_FILE to $DEST_FILE"
            else
              echo "Skipping rename: source and destination are the same ($SRC_FILE)"
            fi
          else
            echo "ERROR: Source file $SRC_FILE not found!"
            ls -R "target/${{ matrix.target }}/release/"
            exit 1
          fi

      - name: Upload Rust binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.final_name }}
          path: rust/target/${{ matrix.target }}/release/${{ matrix.final_name }}

  package:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./rust
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: package/addons/gdservo
          merge-multiple: true

      - name: Build macOS universal binary
        run: |
          if [ -f package/addons/gdservo/libgodot_servo_x64.dylib ] && [ -f package/addons/gdservo/libgodot_servo_arm.dylib ]; then
            lipo -create -output package/addons/gdservo/libgodot_servo.dylib \
              package/addons/gdservo/libgodot_servo_x64.dylib \
              package/addons/gdservo/libgodot_servo_arm.dylib
            rm package/addons/gdservo/libgodot_servo_x64.dylib package/addons/gdservo/libgodot_servo_arm.dylib
          fi

      - name: Copy .gdextension and license
        run: |
          cp ../demo/addons/gdservo/.gdextension package/addons/gdservo/.gdextension
          cp ../LICENSE package/addons/gdservo/. || true

      - name: Create zip archive
        run: |
          cd package
          zip -r ../godot_servo.zip addons

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: godot_servo.zip

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version_check
        working-directory: ./rust
        run: |
          new_version=$(grep '^version =' Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/' | tr -d '\r')
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          git show HEAD~1:rust/Cargo.toml > old_Cargo.toml
          old_version=$(grep '^version =' old_Cargo.toml | head -n1 | sed -E 's/version = "(.*)"/\1/' | tr -d '\r')
          if [ "$new_version" != "$old_version" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Download package artifact
        if: steps.version_check.outputs.version_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: package
          path: .

      - name: Create Release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version_check.outputs.new_version }}
          files: godot_servo.zip
          generate_release_notes: true
